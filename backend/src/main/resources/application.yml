server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/yk_demo?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.yk.system.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
  params: count=countSql

jwt:
  secret: ${JWT_SECRET:yk-system-jwt-secret-key-2024-must-be-at-least-256-bits-long}
  expiration: 86400000

heart-rate:
  simulator:
    enabled: true

server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/yk_demo?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.yk.system.entity
  configuration:
    map-underscore-to-camel-case: true
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 生产环境请注释此行

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
  params: count=countSql

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

heart-rate:
  simulator:
    enabled: true

deepseek:
  api-url: ${DEEPSEEK_API_URL:https://api.deepseek.com/v1}
  api-key: ${DEEPSEEK_API_KEY}
  model: ${DEEPSEEK_MODEL:deepseek-reasoner}
